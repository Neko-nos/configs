default_install_hook_types: [pre-commit, pre-push]

repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    - id: ruff-check
      args: [ --fix ]
      exclude: ^Ubuntu/keyboard/autokey/data/
    - id: ruff-format
      exclude: ^Ubuntu/keyboard/autokey/data/

- repo: local
  hooks:
    # koalaman/shellcheck-precommit uses Docker, so call the local shellcheck binary instead.
    # ref: https://github.com/koalaman/shellcheck-precommit
    - id: lint-bash
      name: ShellCheck Bash scripts
      entry: shellcheck
      language: system
      files: (^Server/.*\.sh$|(^|/)([^/]+\.bash|\.bashrc|\.bash_profile)$)

    - id: zsh-startup-benchmark
      name: Benchmark zsh startup with hyperfine
      entry: scripts/pre-push-zsh-benchmark.sh
      language: unsupported_script
      verbose: true
      pass_filenames: false
      always_run: true
      stages: [pre-push]

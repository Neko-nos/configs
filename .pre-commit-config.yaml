default_install_hook_types: [pre-commit, pre-push]

repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    - id: ruff-check
      args: [ --fix ]
      exclude: ^Ubuntu/keyboard/autokey/data/
    - id: ruff-format
      exclude: ^Ubuntu/keyboard/autokey/data/

- repo: https://github.com/DavidAnson/markdownlint-cli2
  rev: v0.22.1
  hooks:
    - id: markdownlint-cli2
      args: [ --fix ]

- repo: https://github.com/rhysd/actionlint
  rev: v1.7.12
  hooks:
    - id: actionlint-system
      files: ^\.github/workflows/.*\.ya?ml$

- repo: https://github.com/lunarmodules/luacheck
  rev: v1.2.0
  hooks:
    - id: luacheck
      language: system
      args: [--config, Mac/hammerspoon/.luacheckrc]
      files: ^Mac/hammerspoon/init\.lua$

- repo: https://github.com/JohnnyMorganz/StyLua
  rev: v2.5.2
  hooks:
    - id: stylua-system
      args: [--config-path, Mac/hammerspoon/.stylua.toml]
      files: ^Mac/hammerspoon/init\.lua$

- repo: local
  hooks:
    # koalaman/shellcheck-precommit uses Docker, so call the local shellcheck binary instead.
    # ref: https://github.com/koalaman/shellcheck-precommit
    - id: lint-bash
      name: ShellCheck Bash scripts
      entry: shellcheck
      language: system
      files: (^Server/.*\.sh$|(^|/)([^/]+\.bash|\.bashrc|\.bash_profile)$)

    - id: format-rust
      name: Format Rust code
      entry: cargo fmt --manifest-path common/codex/hooks/syntect_highlight/Cargo.toml --all
      language: system
      files: ^common/codex/hooks/syntect_highlight/.*\.(rs|toml|lock)$
      pass_filenames: false

    - id: lint-rust
      name: Lint and fix Rust code
      entry: cargo clippy --manifest-path common/codex/hooks/syntect_highlight/Cargo.toml --all-targets --all-features --fix --allow-dirty --allow-staged -- -D warnings
      language: system
      files: ^common/codex/hooks/syntect_highlight/.*\.(rs|toml|lock)$
      pass_filenames: false

    - id: zsh-startup-benchmark
      name: Benchmark zsh startup with hyperfine
      entry: scripts/pre-push-zsh-benchmark.sh
      language: unsupported_script
      verbose: true
      pass_filenames: false
      always_run: true
      stages: [pre-push]

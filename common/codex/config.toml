#:schema https://developers.openai.com/codex/config-schema.json

# ref: https://github.com/openai/codex/blob/main/docs/config.md#model_providers

model = "gpt-5.5"
model_reasoning_effort = "high"

approval_policy = "on-request"
approvals_reviewer = "auto_review"
default_permissions = "workspace_with_secret_denies"
personality = "pragmatic"

[permissions.workspace_with_secret_denies]
# ref: https://developers.openai.com/codex/permissions#extend-a-profile
extends = ":workspace"

[permissions.workspace_with_secret_denies.workspace_roots]
# Codex always struggles with uv cache.
"~/.cache/uv" = true
"~/.cache/huggingface" = true

[permissions.workspace_with_secret_denies.filesystem]
glob_scan_max_depth = 4
"~/.netrc" = "deny"
"~/.aws/credentials" = "deny"
"~/**/huggingface/token" = "deny"

[permissions.workspace_with_secret_denies.filesystem.":workspace_roots"]
"." = "write"
".env" = "deny"
".env*" = "deny"
"**/.env" = "deny"
"**/.env*" = "deny"
".direnv" = "deny"
".direnv/**" = "deny"
"**/.direnv/**" = "deny"
"secrets" = "deny"
"secrets/**" = "deny"
"**/secrets/**" = "deny"

[permissions.workspace_with_secret_denies.network]
enabled = true

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = false
exclude = [
    "AWS_*",
    "AZURE_*",
    "GCP_*",
    "GOOGLE_*",
    "GH_TOKEN",
    "GITHUB_TOKEN",
    "ANTHROPIC_API_KEY",
    "OPENAI_API_KEY",
    "HUGGINGFACE_*",
    "HF_*",
    "KAGGLE_*",
]
